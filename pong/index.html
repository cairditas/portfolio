<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #canvas {
            border: 2px solid #fff;
            background-color: #000;
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <p>Controls: Arrow Keys or W/S to move paddle</p>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <script src="build/web/pong.js"></script>
</body>
</html>
