# SonarQube project configuration for Gleam Pong game

# Project identification
sonar.projectKey=pong-gleam
sonar.projectName=Gleam Pong Game
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src
sonar.tests=test
sonar.inclusions=**/*.gleam,**/*.mjs
sonar.exclusions=**/node_modules/**,**/coverage/**,**/build/**/gleeunit/**,**/build/**/gleam_stdlib/**

# JavaScript-specific settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage settings
sonar.coverage.exclusions=**/*_test.mjs,**/test/**,**/node_modules/**,**/build/**/gleeunit/**,**/build/**/gleam_stdlib/**

# Language settings
sonar.javascript.file.suffixes=.mjs
sonar.sourceEncoding=UTF-8

# Quality gates and thresholds
sonar.qualitygate.wait=true

# Analysis settings
sonar.scm.provider=git

# Additional analysis parameters
sonar.javascript.environments=browser,node

# Duplication settings
sonar.cpd.javascript.minimumTokens=50
sonar.cpd.javascript.minimumLines=5

# Test settings
sonar.test.inclusions=**/*_test.gleam
