name: Tests

on:
  push:
    branches:
      - main
      
  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for triggering tests'
        required: true
        type: string

env:
  NODE_VERSION: '18'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pong/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run Gleam tests
        run: gleam test

      - name: Check Gleam formatting
        run: gleam format --check src test

      - name: Run npm tests
        run: npm run test

      - name: Run FFI tests
        run: npm run test:ffi

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: pong/coverage/
          retention-days: 1

      - name: Check coverage thresholds
        if: always()
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            LINES=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.lines.pct)")
            FUNCTIONS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.functions.pct)")
            BRANCHES=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.branches.pct)")
            STATEMENTS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.statements.pct)")

            echo "📊 Coverage Summary:"
            echo "Lines: $LINES%"
            echo "Functions: $FUNCTIONS%"
            echo "Branches: $BRANCHES%"
            echo "Statements: $STATEMENTS%"
            echo ""

            # Check thresholds
            LINES_OK=false
            FUNCTIONS_OK=false
            BRANCHES_OK=false
            STATEMENTS_OK=false

            if (( $(echo "$LINES >= 90" | bc -l) )); then
              echo "✅ Lines coverage meets threshold (≥90%)"
              LINES_OK=true
            else
              echo "❌ Lines coverage below threshold (≥90%)"
            fi

            if (( $(echo "$FUNCTIONS >= 90" | bc -l) )); then
              echo "✅ Functions coverage meets threshold (≥90%)"
              FUNCTIONS_OK=true
            else
              echo "❌ Functions coverage below threshold (≥90%)"
            fi

            if (( $(echo "$BRANCHES >= 80" | bc -l) )); then
              echo "✅ Branches coverage meets threshold (≥80%)"
              BRANCHES_OK=true
            else
              echo "❌ Branches coverage below threshold (≥80%)"
            fi

            if (( $(echo "$STATEMENTS >= 90" | bc -l) )); then
              echo "✅ Statements coverage meets threshold (≥90%)"
              STATEMENTS_OK=true
            else
              echo "❌ Statements coverage below threshold (≥90%)"
            fi

            echo ""
            if [ "$LINES_OK" = true ] && [ "$FUNCTIONS_OK" = true ] && [ "$BRANCHES_OK" = true ] && [ "$STATEMENTS_OK" = true ]; then
              echo "🎉 All coverage thresholds met!"
              exit 0
            else
              echo "❌ Coverage thresholds not met"
              exit 1
            fi
          else
            echo "❌ Coverage report not found"
            exit 1
          fi
