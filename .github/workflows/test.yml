name: Tests

on:
  push:
    branches:
      - main
      
  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for triggering tests'
        required: true
        type: string

env:
  NODE_VERSION: '25.8.1'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pong/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: pong/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run Gleam tests
        run: gleam test

      - name: Check Gleam formatting
        run: gleam format --check src test

      - name: Run npm tests
        run: npm run test

      - name: Run FFI tests
        run: npm run test:ffi

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: coverage/coverage-summary.json
          retention-days: 1
